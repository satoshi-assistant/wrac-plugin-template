name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  WRY_OBJC_SUFFIX: WracGainPlugin

jobs:
  rust-format:
    name: Rust format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Rust version
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

  rust-test:
    name: Rust lint and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    # Keep clippy and tests in one per-OS job so both checks share the same
    # checkout and compiled dependency graph. Splitting them would make the CI
    # shape look cleaner, but would duplicate setup and much of the Rust build.
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtkmm-3.0-dev libx11-dev libasound2-dev

      - name: Show Rust version
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace

  plugin-build:
    name: Plugin artifact validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - rust-format
      - rust-test

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            validate-targets: clap,vst3
            verify: |
              test -f "target/wrac/plugins/release/WRAC Gain.clap"
              test -d "target/wrac/plugins/release/WRAC Gain.vst3"
              test -x "target/wrac/standalone/release/WRAC Gain Standalone"
          - os: windows-latest
            validate-targets: clap,vst3
            verify: |
              test -f "target/wrac/plugins/release/WRAC Gain.clap"
              test -d "target/wrac/plugins/release/WRAC Gain.vst3"
              test -f "target/wrac/standalone/release/WRAC Gain Standalone.exe"
          - os: macos-latest
            validate-targets: clap,vst3,au
            verify: |
              test -d "target/wrac/plugins/release/WRAC Gain.clap"
              test -d "target/wrac/plugins/release/WRAC Gain.vst3"
              test -d "target/wrac/plugins/release/WRAC Gain.component"
              test -d "target/wrac/standalone/release/WRAC Gain Standalone.app"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtkmm-3.0-dev libx11-dev libasound2-dev

      - name: Add msbuild to PATH
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: src-gui/package-lock.json

      - name: Show tool versions
        run: |
          rustup show
          rustc --version
          cargo --version
          cmake --version
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            xcodebuild -version
            /usr/bin/auval -h || true
          fi

      - name: Build all supported artifacts
        run: cargo xtask build --release

      - name: Validate plugin artifacts
        if: matrix.validate-targets != ''
        run: cargo xtask validate --release --target=${{ matrix.validate-targets }}

      - name: Verify plugin artifacts
        run: ${{ matrix.verify }}
